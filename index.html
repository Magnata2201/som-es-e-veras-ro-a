<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroGestão Mobile Profissional</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#059669">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1892/1892747.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #059669; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #offline-banner { display: none; }
        body.offline #offline-banner { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex flex-col overflow-hidden">

    <div id="offline-banner" class="bg-red-500 text-white text-xs text-center py-1 font-bold z-50">
        <i class="fas fa-wifi-slash mr-1"></i> Você está offline. O aplicativo está a funcionar com dados guardados.
    </div>

    <header class="bg-emerald-600 text-white shadow-md p-4 flex items-center justify-between z-20 shrink-0 relative">
        <div class="flex items-center gap-3">
            <button id="btn-back" class="hidden text-xl p-1" onclick="app.goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1 id="page-title" class="text-lg font-bold">Painel de Controlo</h1>
        </div>
        <i class="fas fa-leaf text-xl"></i>
    </header>

    <div id="ptr-indicator" class="fixed top-16 left-0 w-full flex justify-center -translate-y-full transition-transform duration-300 z-10 pointer-events-none">
        <div class="bg-white rounded-full shadow-lg p-2 w-10 h-10 flex items-center justify-center mt-2 border border-gray-100">
            <i id="ptr-icon" class="fas fa-arrow-down text-gray-400 text-lg transition-transform"></i>
        </div>
    </div>

    <main id="app-content" class="flex-1 overflow-y-auto hide-scroll p-4 pb-24 relative z-10 overscroll-contain"></main>

    <nav class="bg-white border-t border-gray-200 fixed bottom-0 w-full flex justify-around p-3 pb-safe z-30 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] shrink-0">
        <button onclick="router.navigate('home')" class="nav-btn flex flex-col items-center text-emerald-600 w-16" data-route="home">
            <i class="fas fa-home text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Início</span>
        </button>
        <button onclick="router.navigate('finance')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-emerald-600 w-16" data-route="finance">
            <i class="fas fa-wallet text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Finanças</span>
        </button>
        <button onclick="router.navigate('farm')" class="nav-btn flex flex-col items-center text-gray-400 hover:text-emerald-600 w-16" data-route="farm">
            <i class="fas fa-tractor text-xl mb-1"></i>
            <span class="text-[10px] font-medium">Produção</span>
        </button>
    </nav>

    <button id="fab-add" onclick="ui.openModal()" class="hidden fixed bottom-20 right-6 bg-emerald-600 text-white w-14 h-14 rounded-full shadow-lg items-center justify-center text-2xl z-40 hover:bg-emerald-700 active:scale-95 transition-transform">
        <i class="fas fa-plus"></i>
    </button>

    <div id="form-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-xl p-6 modal-enter max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="text-xl font-bold text-gray-800">Novo Registo</h2>
                <button onclick="ui.closeModal()" class="text-gray-500 text-2xl leading-none">&times;</button>
            </div>
            <form id="dynamic-form" onsubmit="app.handleFormSubmit(event)">
                <div id="form-fields" class="space-y-4"></div>
                <button type="submit" id="btn-submit" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg mt-6 shadow-md active:bg-emerald-700 flex justify-center items-center gap-2">
                    Guardar Dados
                </button>
            </form>
        </div>
    </div>

    <div id="partial-payment-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center">
        <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-xl p-6 modal-enter max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800">Baixa de Pagamento</h2>
                <button onclick="ui.closePartialPaymentModal()" class="text-gray-500 text-2xl leading-none">&times;</button>
            </div>
            
            <div id="partial-payment-desc" class="text-sm text-gray-700 mb-6 bg-emerald-50 p-4 rounded-xl border border-emerald-100 shadow-sm transition-colors duration-300">
                </div>

            <form id="form-partial-payment" onsubmit="app.submitPartialPayment(event)">
                <input type="hidden" id="pay-module" name="module">
                <input type="hidden" id="pay-id" name="id">
                <input type="hidden" id="pay-original-valor" name="original_valor">
                <input type="hidden" id="pay-valor-pago" name="valor_pago">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Baixa</label>
                    <select id="pay-type" name="pay_type" class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-emerald-500 outline-none" onchange="ui.togglePartialFields()">
                        <option value="total">Pagamento Total (Quitar)</option>
                        <option value="parcial">Pagamento Parcial (Abater Valor)</option>
                    </select>
                </div>

                <div id="partial-fields" class="hidden space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Valor Pago Agora (R$)</label>
                        <input type="number" id="pay-amount" name="pay_amount" step="0.01" inputmode="decimal" class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-emerald-500 outline-none" oninput="ui.calculateRemaining()" onkeyup="ui.calculateRemaining()">
                    </div>

                    <div id="pay-next-date-container">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Data da Próxima Parcela/Restante</label>
                        <input type="date" id="pay-next-date" name="pay_next_date" class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>

                <button type="submit" id="btn-submit-payment" class="w-full bg-emerald-600 text-white font-bold py-3 rounded-lg mt-6 shadow-md active:bg-emerald-700 flex justify-center items-center gap-2">
                    Confirmar Transação
                </button>
            </form>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }
        window.addEventListener('online', () => document.body.classList.remove('offline'));
        window.addEventListener('offline', () => document.body.classList.add('offline'));
        if (!navigator.onLine) document.body.classList.add('offline');
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get, push, remove, child, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsJgxmOxRjg3B9U28_Zp4R-zYgPrcYjSQ",
            authDomain: "simoes-e-veras-contas.firebaseapp.com",
            databaseURL: "https://simoes-e-veras-contas-default-rtdb.firebaseio.com",
            projectId: "simoes-e-veras-contas",
            storageBucket: "simoes-e-veras-contas.firebasestorage.app",
            messagingSenderId: "612748909929",
            appId: "1:612748909929:web:08a1e8b19c6b6a6d32b1f8",
            measurementId: "G-SXK8GP2VCE"
        };

        const appFirebase = initializeApp(firebaseConfig);
        const database = getDatabase(appFirebase);

        const utils = {
            parseMoney: (val) => {
                if (val === null || val === undefined || val === '' || val === 'NaN') return 0;
                if (typeof val === 'number') return isNaN(val) ? 0 : val;
                
                let s = val.toString().trim();
                if (s === 'NaN') return 0;
                
                if (s.includes(',') && s.includes('.')) {
                    s = s.replace(/\./g, '').replace(',', '.');
                } else if (s.includes(',')) {
                    s = s.replace(',', '.');
                }
                
                s = s.replace(/[^0-9.-]/g, ''); 
                
                const n = parseFloat(s);
                return isNaN(n) ? 0 : n;
            }
        };

        const dateUtils = {
            getLocalDateStrings: () => {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                const today = new Date(now.getTime() - offset).toISOString().split('T')[0];
                const tomorrowObj = new Date(now.getTime() - offset + (24 * 60 * 60 * 1000));
                const tomorrow = tomorrowObj.toISOString().split('T')[0];
                return { today, tomorrow };
            },
            getLocalMonthString: () => {
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                return new Date(now.getTime() - offset).toISOString().slice(0, 7);
            },
            getFirstAndLastDayMonth: () => {
                const now = new Date();
                const y = now.getFullYear();
                const m = now.getMonth();
                const pad = (n) => n.toString().padStart(2, '0');
                const lastDay = new Date(y, m + 1, 0).getDate();
                return { 
                    firstDay: `${y}-${pad(m+1)}-01`, 
                    lastDay: `${y}-${pad(m+1)}-${pad(lastDay)}` 
                };
            }
        };

        const defaultDates = dateUtils.getFirstAndLastDayMonth();

        const db = {
            get: async (table) => {
                if (!navigator.onLine) {
                    const localData = localStorage.getItem(`offline_${table}`);
                    return localData ? JSON.parse(localData) : [];
                }
                try {
                    const dbRef = ref(database);
                    const snapshot = await get(child(dbRef, table));
                    if (snapshot.exists()) {
                        const data = Object.entries(snapshot.val()).map(([id, val]) => ({ id, ...val }));
                        localStorage.setItem(`offline_${table}`, JSON.stringify(data));
                        return data;
                    }
                    return [];
                } catch (error) {
                    console.error(error);
                    return [];
                }
            },
            insert: async (table, record) => {
                if (!navigator.onLine) {
                    alert("Sem conexão para salvar no Firebase.");
                    throw new Error("Offline");
                }
                await push(ref(database, table), { createdAt: new Date().toISOString(), ...record });
            },
            update: async (table, id, data) => {
                if (!navigator.onLine) {
                    alert("Sem conexão para atualizar.");
                    return;
                }
                await update(ref(database, `${table}/${id}`), data);
            },
            delete: async (table, id) => {
                if (!navigator.onLine) {
                    alert("Sem conexão para deletar.");
                    return;
                }
                await remove(ref(database, `${table}/${id}`));
            }
        };

        const config = {
            modules: {
                'contas_pagar': { title: 'Contas a Pagar', icon: 'fa-file-invoice-dollar', color: 'text-red-500', type: 'finance' },
                'compras': { title: 'Contas de Compras', icon: 'fa-shopping-cart', color: 'text-orange-500', type: 'finance' },
                'pagamento_func': { title: 'Pagamento Funcionários', icon: 'fa-users', color: 'text-blue-500', type: 'finance' },
                'vendas': { title: 'Controle de Vendas', icon: 'fa-hand-holding-dollar', color: 'text-green-500', type: 'finance' },
                'adubacao': { title: 'Datas de Adubação', icon: 'fa-seedling', color: 'text-emerald-500', type: 'farm' },
                'cargas': { title: 'Cargas de Cocos', icon: 'fa-truck-loading', color: 'text-amber-600', type: 'farm' }
            },
            getFields: (module) => {
                const baseFields = [
                    { name: 'data', label: 'Data de Lançamento', type: 'date', required: true },
                    { name: 'descricao', label: module === 'pagamento_func' ? 'Nome do Funcionário' : 'Descrição/Observação', type: 'text', required: true }
                ];
                
                if (module === 'contas_pagar' || module === 'pagamento_func' || module === 'compras') {
                    baseFields.push({ name: 'data_vencimento', label: module === 'compras' ? 'Data de Vencimento (1ª Parcela)' : 'Data de Vencimento', type: 'date', required: true });
                }
                
                if (config.modules[module].type === 'finance') {
                    baseFields.push({ name: 'valor', label: module === 'compras' ? 'Valor Total da Compra (R$)' : 'Valor (R$)', type: 'number', step: '0.01', required: true });
                }
                
                if (module === 'compras') {
                    baseFields.push({ name: 'parcelas', label: 'Quantidade de Parcelas (1 para pronto pagamento)', type: 'number', required: true, value: 1, min: 1 });
                }

                if (module === 'cargas') {
                    baseFields.push({ name: 'quantidade', label: 'Quantidade de Cocos', type: 'number', required: true });
                }
                return baseFields;
            }
        };

        const state = { 
            currentRoute: 'home', 
            currentModule: null,
            cargasMonth: dateUtils.getLocalMonthString(),
            dashboardMonth: dateUtils.getLocalMonthString(),
            vendasStartDate: defaultDates.firstDay,
            vendasEndDate: defaultDates.lastDay
        };

        const ui = {
            formatCurrency: (value) => {
                const n = utils.parseMoney(value);
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(n);
            },
            formatDate: (dateString) => {
                if (!dateString) return '';
                const [y, m, d] = dateString.split('-');
                return `${d}/${m}/${y}`;
            },
            showLoading: () => {
                document.getElementById('app-content').innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-emerald-600 mt-20">
                        <div class="loader mb-4"></div>
                        <p class="text-sm font-semibold">A carregar dados...</p>
                    </div>`;
            },
            getNotificationBanner: (contas, compras, pagamentos) => {
                const { today, tomorrow } = dateUtils.getLocalDateStrings();
                
                const contasHoje = contas.filter(c => c.data_vencimento === today && c.status !== 'pago');
                const contasAmanha = contas.filter(c => c.data_vencimento === tomorrow && c.status !== 'pago');

                const comprasHoje = compras.filter(c => c.data_vencimento === today && c.status !== 'pago');
                const comprasAmanha = compras.filter(c => c.data_vencimento === tomorrow && c.status !== 'pago');
                
                const funcHoje = pagamentos.filter(p => p.data_vencimento === today && p.status !== 'pago');
                const funcAmanha = pagamentos.filter(p => p.data_vencimento === tomorrow && p.status !== 'pago');

                const totalHoje = contasHoje.length + comprasHoje.length + funcHoje.length;
                const totalAmanha = contasAmanha.length + comprasAmanha.length + funcAmanha.length;

                let htmlBanner = '';

                if (totalHoje > 0) {
                    const itensHoje = [
                        ...contasHoje.map(c => `<span class="font-bold">[Conta]</span> ${c.descricao} (${ui.formatCurrency(c.valor)})`), 
                        ...comprasHoje.map(c => `<span class="font-bold">[Compra]</span> ${c.descricao} (${ui.formatCurrency(c.valor)})`), 
                        ...funcHoje.map(p => `<span class="font-bold">[Func]</span> ${p.descricao} (${ui.formatCurrency(p.valor)})`)
                    ];
                    htmlBanner += `
                        <div class="bg-red-600 text-white p-4 rounded-xl mb-3 flex flex-col gap-2 shadow-md">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-exclamation-circle text-lg animate-pulse"></i>
                                <p class="text-sm font-bold">A vencer Hoje: ${totalHoje} compromisso(s)</p>
                            </div>
                            <ul class="text-xs opacity-90 pl-6 list-disc space-y-1 max-h-24 overflow-y-auto hide-scroll">
                                ${itensHoje.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>`;
                }

                if (totalAmanha > 0) {
                    const itensAmanha = [
                        ...contasAmanha.map(c => `<span class="font-bold">[Conta]</span> ${c.descricao} (${ui.formatCurrency(c.valor)})`), 
                        ...comprasAmanha.map(c => `<span class="font-bold">[Compra]</span> ${c.descricao} (${ui.formatCurrency(c.valor)})`), 
                        ...funcAmanha.map(p => `<span class="font-bold">[Func]</span> ${p.descricao} (${ui.formatCurrency(p.valor)})`)
                    ];
                    htmlBanner += `
                        <div class="bg-amber-500 text-white p-4 rounded-xl mb-3 flex flex-col gap-2 shadow-md">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-clock text-lg"></i>
                                <p class="text-sm font-bold">A vencer Amanhã: ${totalAmanha} compromisso(s)</p>
                            </div>
                            <ul class="text-xs opacity-90 pl-6 list-disc space-y-1 max-h-24 overflow-y-auto hide-scroll">
                                ${itensAmanha.map(item => `<li>${item}</li>`).join('')}
                            </ul>
                        </div>`;
                }
                return htmlBanner;
            },
            updateNav: () => {
                document.querySelectorAll('.nav-btn').forEach(tab => {
                    tab.classList.remove('text-emerald-600');
                    tab.classList.add('text-gray-400');
                    if (tab.dataset.route === state.currentRoute) {
                        tab.classList.remove('text-gray-400');
                        tab.classList.add('text-emerald-600');
                    }
                });

                document.getElementById('btn-back').style.display = state.currentModule ? 'block' : 'none';
                document.getElementById('fab-add').style.display = state.currentModule ? 'flex' : 'none';
                
                if (state.currentModule) {
                    document.getElementById('page-title').innerText = config.modules[state.currentModule].title;
                } else {
                    const titles = { 'home': 'Painel Geral', 'finance': 'Módulo Financeiro', 'farm': 'Módulo de Produção' };
                    document.getElementById('page-title').innerText = titles[state.currentRoute] || 'AgroGestão';
                }
            },
            render: async () => {
                ui.updateNav();
                const content = document.getElementById('app-content');
                
                if (state.currentModule) {
                    ui.showLoading();
                    const data = await db.get(state.currentModule);
                    ui.renderList(state.currentModule, data, content);
                } else if (state.currentRoute === 'home') {
                    ui.showLoading();
                    await ui.renderDashboard(content);
                } else {
                    ui.renderModuleGrid(state.currentRoute, content);
                }
            },
            renderDashboard: async (container) => {
                const [vendas, contas, compras, func] = await Promise.all([
                    db.get('vendas'), db.get('contas_pagar'), db.get('compras'),
                    db.get('pagamento_func')
                ]);

                const notificationBanner = ui.getNotificationBanner(contas, compras, func);

                const currentMonth = state.dashboardMonth;

                const vendasMes = vendas.filter(v => v.data && v.data.startsWith(currentMonth));
                const totalVendasBrutas = vendasMes.reduce((acc, val) => acc + utils.parseMoney(val.valor), 0);
                
                const filterExpense = (item) => {
                    const dateToUse = item.data_vencimento || item.data;
                    return dateToUse && dateToUse.startsWith(currentMonth);
                };

                const contasMes = contas.filter(filterExpense);
                const comprasMes = compras.filter(filterExpense);
                const funcMes = func.filter(filterExpense);

                let totalDespesasPagas = 0;
                let totalDespesasPendentes = 0;

                [...contasMes, ...comprasMes, ...funcMes].forEach(item => {
                    const numValorOriginal = utils.parseMoney(item.valor);
                    const numValorPago = utils.parseMoney(item.valor_pago || 0);
                    
                    totalDespesasPagas += numValorPago;
                    totalDespesasPendentes += (numValorOriginal - numValorPago);
                });

                const saldoLiquido = totalVendasBrutas - totalDespesasPagas;

                container.innerHTML = `
                    ${notificationBanner}
                    
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100 flex items-center justify-between">
                        <div>
                            <p class="text-xs text-gray-500 mb-1">Mês de Referência do Resumo</p>
                            <input type="month" value="${currentMonth}" onchange="app.changeDashboardMonth(event)" class="border border-gray-300 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-green-500">
                            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Total de Vendas</p>
                            <p class="text-lg font-bold text-gray-800">${ui.formatCurrency(totalVendasBrutas)}</p>
                        </div>
                        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                            <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Saídas Pagas</p>
                            <p class="text-lg font-bold text-gray-800">${ui.formatCurrency(totalDespesasPagas)}</p>
                        </div>
                    </div>
                    
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${saldoLiquido >= 0 ? 'border-emerald-500' : 'border-red-500'} mb-3">
                        <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Saldo Líquido Atual (Vendas - Pagos)</p>
                        <p class="text-xl font-bold ${saldoLiquido >= 0 ? 'text-emerald-600' : 'text-red-600'}">${ui.formatCurrency(saldoLiquido)}</p>
                    </div>

                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-orange-500 mb-6">
                        <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Total Pendente (A Pagar)</p>
                        <p class="text-xl font-bold text-orange-600">${ui.formatCurrency(totalDespesasPendentes)}</p>
                    </div>

                    <h3 class="font-bold text-gray-700 mb-4">Acesso Rápido</h3>
                    <div class="grid grid-cols-2 gap-3">
                        ${Object.entries(config.modules).map(([key, mod]) => `
                            <button onclick="router.navigate('${mod.type}', '${key}')" class="bg-white p-4 rounded-xl shadow-sm flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform border border-gray-100">
                                <i class="fas ${mod.icon} text-2xl ${mod.color}"></i>
                                <span class="text-xs font-semibold text-center text-gray-700">${mod.title}</span>
                            </button>
                        `).join('')}
                    </div>`;
            },
            renderModuleGrid: (type, container) => {
                const modules = Object.entries(config.modules).filter(([k, v]) => v.type === type);
                container.innerHTML = `
                    <div class="grid grid-cols-1 gap-3">
                        ${modules.map(([key, mod]) => `
                            <div onclick="router.navigate('${type}', '${key}')" class="bg-white p-4 rounded-xl shadow-sm flex items-center justify-between active:scale-95 transition-transform border border-gray-100 cursor-pointer">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center"><i class="fas ${mod.icon} text-xl ${mod.color}"></i></div>
                                    <span class="font-bold text-gray-800">${mod.title}</span>
                                </div>
                                <i class="fas fa-chevron-right text-gray-300"></i>
                            </div>
                        `).join('')}
                    </div>`;
            },
            renderList: (module, data, container) => {
                data.sort((a, b) => new Date(b.data) - new Date(a.data));
                const { today } = dateUtils.getLocalDateStrings();

                let headerHTML = '';
                let renderData = data;

                if (module === 'cargas') {
                    const currentMonth = state.cargasMonth;
                    renderData = data.filter(d => d.data && d.data.startsWith(currentMonth));
                    const totalMes = renderData.reduce((acc, val) => acc + (parseFloat(val.quantidade) || 0), 0);

                    headerHTML = `
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100 flex items-center justify-between">
                            <div>
                                <p class="text-xs text-gray-500 mb-1">Mês de Referência</p>
                                <input type="month" value="${currentMonth}" onchange="app.changeCargasMonth(event)" class="border border-gray-300 rounded p-1 text-sm outline-none">
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-500 mb-1">Total do Mês</p>
                                <p class="text-xl font-bold text-amber-600">${totalMes} <span class="text-xs font-normal">cocos</span></p>
                            </div>
                        </div>
                    `;
                } else if (module === 'vendas') {
                    const start = state.vendasStartDate;
                    const end = state.vendasEndDate;
                    renderData = data.filter(d => d.data && d.data >= start && d.data <= end);
                    const totalVendasPeriodo = renderData.reduce((acc, val) => acc + utils.parseMoney(val.valor), 0);

                    headerHTML = `
                        <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-100 flex flex-col gap-3">
                            <div class="flex justify-between items-end gap-2">
                                <div class="flex-1">
                                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block">Início</label>
                                    <input type="date" value="${start}" onchange="app.changeVendasStart(event)" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500">
                                </div>
                                <div class="flex-1">
                                    <label class="text-[10px] text-gray-500 font-bold uppercase mb-1 block">Fim</label>
                                    <input type="date" value="${end}" onchange="app.changeVendasEnd(event)" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-emerald-500">
                                </div>
                            </div>
                            <div class="bg-emerald-50 p-3 rounded-lg flex justify-between items-center border border-emerald-100">
                                <span class="text-xs font-bold text-emerald-800">Total Vendido no Período:</span>
                                <span class="text-lg font-bold text-emerald-700">${ui.formatCurrency(totalVendasPeriodo)}</span>
                            </div>
                        </div>
                    `;
                }

                if (renderData.length === 0) {
                    container.innerHTML = headerHTML + `<div class="flex flex-col items-center justify-center h-full text-gray-400 mt-10"><i class="fas fa-folder-open text-4xl mb-3"></i><p>Nenhum registo encontrado no período.</p></div>`;
                    return;
                }

                const listHTML = `<div class="space-y-3">` + renderData.map(item => {
                    const temVencimento = module === 'contas_pagar' || module === 'pagamento_func' || module === 'compras';
                    
                    const numValorOriginal = utils.parseMoney(item.valor);
                    const numValorPago = utils.parseMoney(item.valor_pago || 0);
                    const numValorPendente = numValorOriginal - numValorPago;

                    const isPago = item.status === 'pago' || numValorPendente <= 0;
                    const isVencidaOuHoje = !isPago && temVencimento && item.data_vencimento && (item.data_vencimento <= today);
                    
                    const cardStyle = isPago ? 'bg-gray-100 border-gray-200 opacity-70' : (isVencidaOuHoje ? 'bg-red-50 border-red-300' : 'bg-white border-gray-100');
                    const textStyle = isPago ? 'text-gray-500 line-through' : (isVencidaOuHoje ? 'text-red-900' : 'text-gray-800');

                    const encodedDesc = encodeURIComponent(item.descricao);
                    
                    const exibirValor = isPago ? numValorOriginal : numValorPendente;

                    const valorHTML = item.valor !== undefined && numValorOriginal >= 0 
                        ? `<div class="flex flex-col items-end">
                             ${numValorPago > 0 && !isPago ? `<span class="text-[10px] text-emerald-600 font-bold leading-tight mb-0.5"><i class="fas fa-check-double mr-1"></i>Pago: ${ui.formatCurrency(numValorPago)}</span>` : ''}
                             <span class="font-bold text-sm ${isPago ? 'text-gray-400' : (temVencimento ? 'text-red-600' : (module === 'vendas' ? 'text-green-600' : 'text-gray-700'))}">${ui.formatCurrency(exibirValor)}</span>
                           </div>` 
                        : `<span class="font-bold text-sm mb-1 text-gray-400">R$ 0,00</span>`;

                    return `
                        <div class="${cardStyle} p-4 rounded-xl shadow-sm border flex justify-between items-center transition-all">
                            <div class="flex-1 pr-2">
                                <p class="text-[11px] text-gray-500 mb-1"><i class="far fa-calendar-alt mr-1"></i> Lançamento: ${ui.formatDate(item.data)}</p>
                                <div class="flex items-center flex-wrap gap-1 mb-1">
                                    <span class="font-bold ${textStyle} capitalize text-sm">${item.descricao}</span>
                                    ${isPago ? `<span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2 py-0.5 rounded tracking-wide shadow-sm">QUITADO</span>` : ''}
                                </div>
                                ${item.data_vencimento ? `<p class="text-xs font-semibold mt-1 ${isVencidaOuHoje ? 'text-red-600 animate-pulse' : 'text-gray-500'}"><i class="fas fa-calendar-check mr-1"></i> Vencimento: ${ui.formatDate(item.data_vencimento)}</p>` : ''}
                                ${item.quantidade ? `<p class="text-sm text-amber-600 font-semibold mt-1"><i class="fas fa-cubes mr-1"></i> ${item.quantidade} cocos</p>` : ''}
                            </div>
                            <div class="flex flex-col items-end gap-2 shrink-0">
                                ${valorHTML}
                                <div class="flex items-center gap-1">
                                    ${module === 'contas_pagar' && !isPago ? `<button onclick="app.payRecurringBill('${item.id}', '${item.data_vencimento}')" class="text-blue-500 hover:bg-blue-100 rounded-full w-8 h-8 flex items-center justify-center transition-colors" title="Renovar para o próximo mês"><i class="fas fa-sync-alt text-sm"></i></button>` : ''}
                                    
                                    ${config.modules[module].type === 'finance' && module !== 'vendas' && !isPago ? `
                                        <button onclick="ui.openPartialPaymentModal('${module}', '${item.id}', '${encodedDesc}', '${numValorOriginal}', '${numValorPago}')" class="text-emerald-600 hover:bg-emerald-100 rounded-full w-8 h-8 flex items-center justify-center transition-colors shadow-sm bg-white border border-emerald-100" title="Dar Baixa/Pagar">
                                            <i class="fas fa-check"></i>
                                        </button>
                                    ` : ''}

                                    <button onclick="app.deleteRecord('${module}', '${item.id}')" class="text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full w-8 h-8 flex items-center justify-center transition-colors" title="Eliminar"><i class="fas fa-trash text-sm"></i></button>
                                </div>
                            </div>
                        </div>`;
                }).join('') + `</div>`;

                container.innerHTML = headerHTML + listHTML;
            },
            openModal: () => {
                const mod = state.currentModule;
                document.getElementById('modal-title').innerText = `Novo: ${config.modules[mod].title}`;
                
                const formHTML = config.getFields(mod).map(f => `
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">${f.label}</label>
                        <input type="${f.type}" name="${f.name}" ${f.required ? 'required' : ''} ${f.step ? `step="${f.step}"` : ''} ${f.type === 'number' && f.step ? 'inputmode="decimal"' : ''} ${f.value ? `value="${f.value}"` : ''} ${f.min ? `min="${f.min}"` : ''}
                            class="w-full border border-gray-300 rounded-lg p-3 text-gray-800 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all">
                    </div>
                `).join('');
                
                document.getElementById('form-fields').innerHTML = formHTML;
                document.getElementById('form-modal').classList.remove('hidden');
                
                const { today } = dateUtils.getLocalDateStrings();
                document.querySelectorAll('input[type="date"]').forEach(input => input.value = today);
            },
            closeModal: () => {
                document.getElementById('form-modal').classList.add('hidden');
                document.getElementById('dynamic-form').reset();
            },
            openPartialPaymentModal: (module, id, encodedDesc, valorOriginal, valorPago) => {
                const descricao = decodeURIComponent(encodedDesc);
                const numValorOriginal = utils.parseMoney(valorOriginal);
                const numValorPago = utils.parseMoney(valorPago);
                const pendente = numValorOriginal - numValorPago;
                
                document.getElementById('partial-payment-desc').innerHTML = `
                    <div class="flex justify-between items-center w-full">
                        <span class="font-bold text-gray-800 truncate pr-2 flex-1">${descricao}</span>
                        <div class="text-right shrink-0">
                            <span class="block text-[10px] text-gray-500 uppercase font-semibold tracking-wider mb-0.5">Valor Restante</span>
                            <span id="top-display-value" class="text-emerald-600 font-bold text-lg transition-all">${ui.formatCurrency(pendente)}</span>
                        </div>
                    </div>
                `;

                document.getElementById('pay-module').value = module;
                document.getElementById('pay-id').value = id;
                document.getElementById('pay-original-valor').value = numValorOriginal;
                document.getElementById('pay-valor-pago').value = numValorPago;

                document.getElementById('pay-type').value = 'total';
                document.getElementById('pay-amount').value = '';
                document.getElementById('pay-next-date').value = '';
                
                ui.togglePartialFields();
                document.getElementById('partial-payment-modal').classList.remove('hidden');
            },
            closePartialPaymentModal: () => {
                document.getElementById('partial-payment-modal').classList.add('hidden');
                document.getElementById('form-partial-payment').reset();
            },
            calculateRemaining: () => {
                const valorOriginal = utils.parseMoney(document.getElementById('pay-original-valor').value);
                const valorPago = utils.parseMoney(document.getElementById('pay-valor-pago').value);
                const payAmount = utils.parseMoney(document.getElementById('pay-amount').value);
                
                const pendente = valorOriginal - valorPago;
                let remaining = pendente - payAmount;
                
                const displayValue = document.getElementById('top-display-value');
                const dateInputContainer = document.getElementById('pay-next-date-container');
                
                if (remaining <= 0 && payAmount > 0) {
                    displayValue.innerText = "Sairá como Quitada";
                    displayValue.className = "text-blue-600 font-bold text-lg transition-all";
                    dateInputContainer.classList.add('hidden');
                    document.getElementById('pay-next-date').required = false;
                } else {
                    displayValue.innerText = ui.formatCurrency(remaining);
                    displayValue.className = "text-emerald-600 font-bold text-lg transition-all";
                    dateInputContainer.classList.remove('hidden');
                    document.getElementById('pay-next-date').required = true;
                }
            },
            togglePartialFields: () => {
                const type = document.getElementById('pay-type').value;
                const fields = document.getElementById('partial-fields');
                const amountInput = document.getElementById('pay-amount');
                const dateInput = document.getElementById('pay-next-date');
                const dateInputContainer = document.getElementById('pay-next-date-container');

                if (type === 'parcial') {
                    fields.classList.remove('hidden');
                    amountInput.required = true;
                    dateInput.required = true;
                    dateInputContainer.classList.remove('hidden');
                    ui.calculateRemaining();
                } else {
                    fields.classList.add('hidden');
                    amountInput.required = false;
                    dateInput.required = false;
                    
                    const valorOriginal = utils.parseMoney(document.getElementById('pay-original-valor').value);
                    const valorPago = utils.parseMoney(document.getElementById('pay-valor-pago').value);
                    const pendente = valorOriginal - valorPago;

                    const displayValue = document.getElementById('top-display-value');
                    if(displayValue) {
                        displayValue.innerText = ui.formatCurrency(pendente);
                        displayValue.className = "text-emerald-600 font-bold text-lg transition-all";
                    }
                }
            }
        };

        const app = {
            goBack: () => router.navigate(config.modules[state.currentModule].type),
            changeCargasMonth: async (e) => {
                state.cargasMonth = e.target.value;
                await ui.render();
            },
            changeDashboardMonth: async (e) => {
                state.dashboardMonth = e.target.value;
                await ui.render();
            },
            changeVendasStart: async (e) => {
                state.vendasStartDate = e.target.value;
                await ui.render();
            },
            changeVendasEnd: async (e) => {
                state.vendasEndDate = e.target.value;
                await ui.render();
            },
            payRecurringBill: async (id, currentDueDate) => {
                if(confirm('Confirmar renovação? O vencimento desta conta será prorrogado automaticamente para o próximo mês.')) {
                    ui.showLoading();
                    try {
                        const date = new Date(currentDueDate + 'T12:00:00'); 
                        date.setMonth(date.getMonth() + 1);
                        const nextMonth = date.toISOString().split('T')[0];
                        await db.update('contas_pagar', id, { data_vencimento: nextMonth });
                    } catch (error) {
                        console.error("Erro ao renovar conta:", error);
                    }
                    await ui.render();
                }
            },
            submitPartialPayment: async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-submit-payment');
                btn.disabled = true;

                try {
                    const module = document.getElementById('pay-module').value;
                    const id = document.getElementById('pay-id').value;
                    const valorOriginal = utils.parseMoney(document.getElementById('pay-original-valor').value);
                    const valorPagoAtual = utils.parseMoney(document.getElementById('pay-valor-pago').value);
                    const type = document.getElementById('pay-type').value;
                    
                    const payAmount = utils.parseMoney(document.getElementById('pay-amount').value);
                    const nextDate = document.getElementById('pay-next-date').value;

                    if (type === 'parcial') {
                        if (payAmount <= 0) {
                            alert("Por favor, digite um valor válido para abater.");
                            btn.disabled = false;
                            return;
                        }
                    }

                    ui.closePartialPaymentModal();
                    ui.showLoading();

                    if (type === 'total') {
                        await db.update(module, id, { 
                            status: 'pago', 
                            valor_pago: valorOriginal.toFixed(2)
                        });
                    } else {
                        const novoValorPago = valorPagoAtual + payAmount;
                        
                        if (novoValorPago >= valorOriginal) {
                            await db.update(module, id, { 
                                status: 'pago', 
                                valor_pago: valorOriginal.toFixed(2) 
                            });
                        } else {
                            await db.update(module, id, {
                                valor_pago: novoValorPago.toFixed(2),
                                data_vencimento: nextDate
                            });
                        }
                    }
                } catch (error) {
                    console.error("Erro na transação:", error);
                    alert("Erro ao processar a baixa no sistema.");
                } finally {
                    btn.disabled = false;
                    await ui.render(); 
                }
            },
            handleFormSubmit: async (e) => {
                e.preventDefault();
                document.getElementById('btn-submit').disabled = true;
                try {
                    const data = Object.fromEntries(new FormData(e.target).entries());
                    data.status = 'pendente'; 
                    data.valor_pago = 0; 

                    if (state.currentModule === 'compras') {
                        const parcelas = parseInt(data.parcelas) || 1;
                        const valorTotal = utils.parseMoney(data.valor);

                        if (parcelas > 1) {
                            const valorBase = Math.floor((valorTotal / parcelas) * 100) / 100;
                            const diferenca = valorTotal - (valorBase * parcelas);
                            let dataVencimentoBase = new Date(data.data_vencimento + 'T12:00:00');

                            for (let i = 1; i <= parcelas; i++) {
                                const record = { ...data };
                                const valorParcela = i === 1 ? (valorBase + diferenca) : valorBase;
                                record.valor = valorParcela.toFixed(2);
                                record.valor_pago = 0;
                                record.descricao = `${data.descricao} (Parc. ${i}/${parcelas})`;
                                
                                const dt = new Date(dataVencimentoBase.getTime());
                                dt.setMonth(dt.getMonth() + (i - 1));
                                record.data_vencimento = dt.toISOString().split('T')[0];
                                
                                delete record.parcelas;
                                await db.insert(state.currentModule, record);
                            }
                        } else {
                            delete data.parcelas;
                            data.valor = utils.parseMoney(data.valor).toFixed(2);
                            await db.insert(state.currentModule, data);
                        }
                    } else {
                        if (data.valor) data.valor = utils.parseMoney(data.valor).toFixed(2);
                        await db.insert(state.currentModule, data);
                    }
                    ui.closeModal();
                } catch (error) {
                    console.error("Erro ao guardar form:", error);
                } finally {
                    document.getElementById('btn-submit').disabled = false;
                    await ui.render();
                }
            },
            deleteRecord: async (module, id) => {
                if(confirm('Tem a certeza de que deseja eliminar este registo do Firebase?')) {
                    ui.showLoading();
                    await db.delete(module, id);
                    await ui.render();
                }
            }
        };

        const pullToRefresh = {
            startY: 0,
            currentY: 0,
            isAtTop: false,
            isPulling: false,
            threshold: 70,
            init: () => {
                const content = document.getElementById('app-content');
                const indicator = document.getElementById('ptr-indicator');
                const icon = document.getElementById('ptr-icon');

                content.addEventListener('touchstart', (e) => {
                    if (content.scrollTop <= 0) {
                        pullToRefresh.startY = e.touches[0].clientY;
                        pullToRefresh.isAtTop = true;
                        indicator.style.transition = 'none';
                    } else {
                        pullToRefresh.isAtTop = false;
                    }
                }, { passive: true });

                content.addEventListener('touchmove', (e) => {
                    if (!pullToRefresh.isAtTop) return;
                    pullToRefresh.currentY = e.touches[0].clientY;
                    const dy = pullToRefresh.currentY - pullToRefresh.startY;

                    if (dy > 0 && content.scrollTop <= 0) {
                        pullToRefresh.isPulling = true;
                        const moveY = Math.min(dy * 0.4, pullToRefresh.threshold + 20);
                        indicator.style.transform = `translateY(${moveY}px)`;
                        
                        if (moveY >= pullToRefresh.threshold) {
                            icon.className = 'fas fa-sync text-emerald-600 text-lg rotate-180 transition-transform';
                        } else {
                            icon.className = 'fas fa-arrow-down text-gray-400 text-lg transition-transform';
                        }
                    }
                }, { passive: true });

                content.addEventListener('touchend', async () => {
                    if (pullToRefresh.isPulling) {
                        pullToRefresh.isPulling = false;
                        indicator.style.transition = 'transform 0.3s ease-out';
                        
                        const dy = pullToRefresh.currentY - pullToRefresh.startY;
                        const moveY = dy * 0.4;

                        if (moveY >= pullToRefresh.threshold) {
                            icon.className = 'fas fa-circle-notch fa-spin text-emerald-600 text-lg';
                            indicator.style.transform = `translateY(${pullToRefresh.threshold}px)`;
                            await ui.render();
                        }
                        
                        indicator.style.transform = 'translateY(-150%)';
                        setTimeout(() => { icon.className = 'fas fa-arrow-down text-gray-400 text-lg'; }, 300);
                    }
                    pullToRefresh.isAtTop = false;
                });
            }
        };

        const router = {
            navigate: async (route, module = null) => {
                state.currentRoute = route;
                state.currentModule = module;
                await ui.render();
            }
        };

        window.router = router;
        window.ui = ui;
        window.app = app;
        
        window.addEventListener('DOMContentLoaded', () => {
            router.navigate('home');
            pullToRefresh.init();
        });
    </script>
</body>
</html>
